name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install setuptools wheel && pip install -e ".[test]" || pip install -e .

      - name: Import check
        run: |
          python -c "
          from supervisor.events import EventType, emit, subscribe
          from supervisor.commands import dispatch, get_help
          from supervisor.prompts import SYSTEM_PROMPT
          from supervisor.tools import TOOLS
          from supervisor.claude import run_claude
          from supervisor.memory import summarize_if_needed
          from supervisor.config import get_api_key, load_project_instructions
          from supervisor.cost import summary, record
          from supervisor.deepseek import get_client
          from supervisor.orchestrator import orchestrate
          from supervisor.app import SupervisApp
          from supervisor.widgets import OutputLog, InputBar, StatusBar
          print('All imports OK')
          print(f'Tools: {[t[\"function\"][\"name\"] for t in TOOLS]}')
          "

      - name: Tests
        run: |
          pip install pytest pytest-asyncio
          python -m pytest tests/ -v
